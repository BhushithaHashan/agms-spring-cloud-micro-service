server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/BhushithaHashan/agms_config.git
          clone-on-start: true
          default-label: master # Ensure this matches the branch name 

  profiles:
    active: git

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
